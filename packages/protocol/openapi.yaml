{
  "openapi": "3.1.1",
  "jsonSchemaDialect": "https://spec.openapis.org/oas/3.1/dialect/base",
  "info": {
    "title": "Philcoino ESP32 API",
    "version": "1.0.0",
    "description": "Local-network API for monitoring and configuring one Philcoino espresso machine."
  },
  "servers": [
    {
      "url": "http://{host}",
      "variables": {
        "host": {
          "default": "philcoino.local",
          "description": "mDNS hostname or manually entered local IP address"
        }
      }
    }
  ],
  "paths": {
    "/healthz": {
      "get": {
        "operationId": "getHealth",
        "summary": "Read process and network health",
        "security": [],
        "responses": {
          "200": {
            "description": "The device HTTP service is healthy.",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/HealthResponse" }
              }
            }
          }
        }
      }
    },
    "/api/v1/device": {
      "get": {
        "operationId": "getDevice",
        "summary": "Read public device identity",
        "security": [],
        "responses": {
          "200": {
            "description": "Stable device identity and version information.",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/DeviceResponse" }
              }
            }
          },
          "500": { "$ref": "#/components/responses/InternalError" }
        }
      }
    },
    "/api/v1/state": {
      "get": {
        "operationId": "getMachineState",
        "summary": "Read the complete machine snapshot",
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": {
            "description": "Current temperatures, targets, control state, and fault data.",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/MachineState" }
              }
            }
          },
          "401": { "$ref": "#/components/responses/Unauthorized" },
          "500": { "$ref": "#/components/responses/InternalError" }
        }
      }
    },
    "/api/v1/settings/temperatures": {
      "patch": {
        "operationId": "updateTemperatureSettings",
        "summary": "Validate and persist one or both temperature targets",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/TemperatureSettingsRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Both persisted targets after the requested update.",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/TemperatureSettingsResponse" }
              }
            }
          },
          "400": { "$ref": "#/components/responses/BadRequest" },
          "401": { "$ref": "#/components/responses/Unauthorized" },
          "409": { "$ref": "#/components/responses/Conflict" },
          "500": { "$ref": "#/components/responses/InternalError" }
        }
      }
    },
    "/api/v1/mode": {
      "put": {
        "operationId": "setMode",
        "summary": "Idempotently select the active temperature-control mode",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/ModeRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "The resulting acknowledged mode.",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ModeResponse" }
              }
            }
          },
          "400": { "$ref": "#/components/responses/BadRequest" },
          "401": { "$ref": "#/components/responses/Unauthorized" },
          "409": { "$ref": "#/components/responses/Conflict" },
          "500": { "$ref": "#/components/responses/InternalError" }
        }
      }
    },
    "/api/v1/heater": {
      "put": {
        "operationId": "setHeaterPermission",
        "summary": "Allow or inhibit automatic heater output",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/HeaterSettingsRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "The resulting acknowledged volatile heater permission.",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/HeaterSettingsResponse" }
              }
            }
          },
          "400": { "$ref": "#/components/responses/BadRequest" },
          "401": { "$ref": "#/components/responses/Unauthorized" },
          "500": { "$ref": "#/components/responses/InternalError" }
        }
      }
    },
    "/api/v1/faults/over-temperature/dismiss": {
      "post": {
        "operationId": "dismissOverTemperature",
        "summary": "Dismiss a recoverable over-temperature fault after cooldown",
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": {
            "description": "The fresh machine snapshot after the over-temperature fault is dismissed.",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/OverTemperatureDismissResponse" }
              }
            }
          },
          "401": { "$ref": "#/components/responses/Unauthorized" },
          "409": { "$ref": "#/components/responses/Conflict" },
          "500": { "$ref": "#/components/responses/InternalError" }
        }
      }
    },
    "/api/v2/state": {
      "get": {
        "operationId": "getMachineStateV2",
        "summary": "Read acknowledged machine, extraction, compensation, and cooldown state",
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": {
            "description": "Current API v1 machine state plus firmware-acknowledged extraction, compensation, and cooldown state.",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/MachineStateV2" }
              }
            }
          },
          "401": { "$ref": "#/components/responses/V2Unauthorized" },
          "500": { "$ref": "#/components/responses/V2InternalError" }
        }
      }
    },
    "/api/v2/profiles": {
      "get": {
        "operationId": "getExtractionProfiles",
        "summary": "Read all four persisted custom profile slots",
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": {
            "description": "The complete persisted machine profile set.",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ProfileSet" }
              }
            }
          },
          "401": { "$ref": "#/components/responses/V2Unauthorized" },
          "500": { "$ref": "#/components/responses/V2InternalError" }
        }
      },
      "put": {
        "operationId": "replaceExtractionProfiles",
        "summary": "Atomically replace all four custom profile slots while idle",
        "description": "The previous complete set remains persisted if validation or persistence fails.",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/ProfileSet" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "The complete acknowledged persisted profile set.",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ProfileSet" }
              }
            }
          },
          "400": { "$ref": "#/components/responses/V2BadRequest" },
          "401": { "$ref": "#/components/responses/V2Unauthorized" },
          "409": {
            "description": "An extraction or cooldown is active; no profile slot was changed.",
            "content": {
              "application/json": {
                "schema": {
                  "oneOf": [
                    { "$ref": "#/components/schemas/ExtractionActiveConflictResponse" },
                    { "$ref": "#/components/schemas/CooldownActiveConflictResponse" }
                  ]
                }
              }
            }
          },
          "500": { "$ref": "#/components/responses/V2InternalError" }
        }
      }
    },
    "/api/v2/extractions/start": {
      "post": {
        "operationId": "startExtraction",
        "summary": "Start Manual or one persisted profile idempotently",
        "description": "Start is accepted only in acknowledged Brew mode and while cooldown is idle. Replaying the same idempotency key returns the same active extraction without resetting its monotonic timing. A different key while active is rejected.",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/StartExtractionRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "The same acknowledged active extraction for a new or replayed key.",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/RunningExtractionState" }
              }
            }
          },
          "400": { "$ref": "#/components/responses/V2BadRequest" },
          "401": { "$ref": "#/components/responses/V2Unauthorized" },
          "409": {
            "description": "The machine is not in Brew, a different extraction or cooldown is active, or the selected custom slot is empty.",
            "content": {
              "application/json": {
                "schema": {
                  "oneOf": [
                    { "$ref": "#/components/schemas/ExtractionActiveConflictResponse" },
                    { "$ref": "#/components/schemas/CooldownActiveConflictResponse" },
                    { "$ref": "#/components/schemas/ApiV2ErrorResponse" }
                  ]
                }
              }
            }
          },
          "500": { "$ref": "#/components/responses/V2InternalError" }
        }
      }
    },
    "/api/v2/extractions/stop": {
      "post": {
        "operationId": "stopExtraction",
        "summary": "Idempotently stop extraction and acknowledge idle",
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": {
            "description": "Acknowledged idle state, including when extraction was already idle.",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/IdleExtractionState" }
              }
            }
          },
          "401": { "$ref": "#/components/responses/V2Unauthorized" },
          "500": { "$ref": "#/components/responses/V2InternalError" }
        }
      }
    },
    "/api/v2/cooldowns/start": {
      "post": {
        "operationId": "startCooldown",
        "summary": "Start the firmware-owned cooldown workflow idempotently",
        "description": "A new key is eligible only while extraction and cooldown are idle, the validated Brew-effective temperature is above the current Brew target, and no sensor or machine fault prevents operation. Firmware switches to Brew, establishes the transient heater inhibit, commands the heater off, snapshots the Brew target, and only then commands the pump running. Replaying the retained key returns the original cooldown identity and current or terminal acknowledgement without restarting the 45-second pump deadline. A different key replaces a terminal acknowledgement only after fresh eligibility checks.",
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/StartCooldownRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "The acknowledged new, replayed, active, or retained terminal cooldown state. Same-key replay never restarts a deadline.",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/CooldownState" }
              }
            }
          },
          "400": { "$ref": "#/components/responses/V2BadRequest" },
          "401": { "$ref": "#/components/responses/V2Unauthorized" },
          "409": {
            "description": "An extraction or different cooldown is active, or sensor, fault, or temperature eligibility rejects a new cooldown.",
            "content": {
              "application/json": {
                "schema": {
                  "oneOf": [
                    { "$ref": "#/components/schemas/ExtractionActiveConflictResponse" },
                    { "$ref": "#/components/schemas/CooldownActiveConflictResponse" },
                    { "$ref": "#/components/schemas/ApiV2ErrorResponse" }
                  ]
                }
              }
            }
          },
          "500": { "$ref": "#/components/responses/V2InternalError" }
        }
      }
    },
    "/api/v2/cooldowns/stop": {
      "post": {
        "operationId": "stopCooldown",
        "summary": "Idempotently stop cooldown pumping",
        "description": "While pumping, Stop commands the pump off and enters the same five-second stabilization phase with outcome stopped. During stabilization or idle it returns the current acknowledgement unchanged.",
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": {
            "description": "The acknowledged stabilizing or idle cooldown state.",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/CooldownState" }
              }
            }
          },
          "401": { "$ref": "#/components/responses/V2Unauthorized" },
          "500": { "$ref": "#/components/responses/V2InternalError" }
        }
      }
    }
  },
  "components": {
    "securitySchemes": {
      "bearerAuth": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "opaque"
      }
    },
    "responses": {
      "BadRequest": {
        "description": "The JSON body is malformed or violates a request constraint.",
        "content": {
          "application/json": {
            "schema": { "$ref": "#/components/schemas/ErrorResponse" }
          }
        }
      },
      "Unauthorized": {
        "description": "The bearer token is missing or invalid.",
        "headers": {
          "WWW-Authenticate": {
            "schema": { "type": "string" },
            "description": "Bearer authentication challenge."
          }
        },
        "content": {
          "application/json": {
            "schema": { "$ref": "#/components/schemas/ErrorResponse" }
          }
        }
      },
      "Conflict": {
        "description": "The machine cannot apply the valid command in its current state.",
        "content": {
          "application/json": {
            "schema": { "$ref": "#/components/schemas/ErrorResponse" }
          }
        }
      },
      "InternalError": {
        "description": "The device could not complete the request.",
        "content": {
          "application/json": {
            "schema": { "$ref": "#/components/schemas/ErrorResponse" }
          }
        }
      },
      "V2BadRequest": {
        "description": "The JSON body is malformed or violates an API v2 request constraint.",
        "content": {
          "application/json": {
            "schema": { "$ref": "#/components/schemas/ApiV2ErrorResponse" }
          }
        }
      },
      "V2Unauthorized": {
        "description": "The bearer token is missing or invalid.",
        "headers": {
          "WWW-Authenticate": {
            "schema": { "type": "string" },
            "description": "Bearer authentication challenge."
          }
        },
        "content": {
          "application/json": {
            "schema": { "$ref": "#/components/schemas/ApiV2ErrorResponse" }
          }
        }
      },
      "V2InternalError": {
        "description": "The device could not complete the API v2 request.",
        "content": {
          "application/json": {
            "schema": { "$ref": "#/components/schemas/ApiV2ErrorResponse" }
          }
        }
      }
    },
    "schemas": {
      "Mode": {
        "type": "string",
        "enum": ["brew", "steam"]
      },
      "MachineStatus": {
        "type": "string",
        "enum": ["heating", "ready", "fault"]
      },
      "FaultCode": {
        "type": "string",
        "enum": [
          "sensor_failure",
          "over_temperature",
          "heating_timeout",
          "internal_error"
        ]
      },
      "ErrorCode": {
        "type": "string",
        "enum": [
          "malformed_request",
          "unauthorized",
          "temperature_out_of_range",
          "sensor_unavailable",
          "persistence_failure",
          "internal_error"
        ]
      },
      "BrewTarget": {
        "type": "integer",
        "minimum": 85,
        "maximum": 95
      },
      "SteamTarget": {
        "type": "integer",
        "minimum": 110,
        "maximum": 120
      },
      "HealthResponse": {
        "type": "object",
        "additionalProperties": false,
        "required": ["status", "uptimeMs"],
        "properties": {
          "status": { "const": "ok" },
          "uptimeMs": { "type": "integer", "minimum": 0 }
        },
        "examples": [
          { "status": "ok", "uptimeMs": 184220 }
        ]
      },
      "DeviceResponse": {
        "type": "object",
        "additionalProperties": false,
        "required": ["deviceId", "name", "model", "apiVersion", "firmwareVersion"],
        "properties": {
          "deviceId": {
            "type": "string",
            "minLength": 1,
            "maxLength": 64,
            "pattern": "^[A-Za-z0-9][A-Za-z0-9._-]*$"
          },
          "name": { "type": "string", "minLength": 1, "maxLength": 64 },
          "model": { "type": "string", "minLength": 1, "maxLength": 64 },
          "apiVersion": { "const": "1" },
          "firmwareVersion": { "type": "string", "minLength": 1, "maxLength": 32 }
        },
        "examples": [
          {
            "deviceId": "philcoino-c3-a1b2c3",
            "name": "Kitchen espresso machine",
            "model": "philcoino-esp32-c3",
            "apiVersion": "1",
            "firmwareVersion": "1.0.0"
          }
        ]
      },
      "Fault": {
        "type": "object",
        "additionalProperties": false,
        "required": ["code", "message"],
        "properties": {
          "code": { "$ref": "#/components/schemas/FaultCode" },
          "message": { "type": "string", "minLength": 1, "maxLength": 160 }
        }
      },
      "MachineState": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "status",
          "activeMode",
          "boilerTemperatureC",
          "brewTargetC",
          "steamTargetC",
          "heaterEnabled",
          "heaterActive",
          "fault",
          "steamTimeoutRemainingMs",
          "uptimeMs"
        ],
        "properties": {
          "status": { "$ref": "#/components/schemas/MachineStatus" },
          "activeMode": { "$ref": "#/components/schemas/Mode" },
          "boilerTemperatureC": {
            "type": "number",
            "description": "The firmware-authoritative active effective control temperature. For a valid thermocouple sample, Brew mode reports the raw boiler-base reading and Steam mode reports that raw reading plus the firmware-configured Steam offset (currently +5 degrees Celsius). A mode change can therefore change this value by 5 degrees Celsius without a new physical sensor reading."
          },
          "brewTargetC": { "$ref": "#/components/schemas/BrewTarget" },
          "steamTargetC": { "$ref": "#/components/schemas/SteamTarget" },
          "heaterEnabled": { "type": "boolean" },
          "heaterActive": { "type": "boolean" },
          "fault": {
            "oneOf": [
              { "$ref": "#/components/schemas/Fault" },
              { "type": "null" }
            ]
          },
          "steamTimeoutRemainingMs": {
            "oneOf": [
              { "type": "integer", "minimum": 0, "maximum": 300000 },
              { "type": "null" }
            ]
          },
          "uptimeMs": { "type": "integer", "minimum": 0 }
        },
        "allOf": [
          {
            "if": {
              "properties": { "status": { "const": "fault" } },
              "required": ["status"]
            },
            "then": {
              "properties": {
                "fault": { "$ref": "#/components/schemas/Fault" },
                "heaterActive": { "const": false }
              }
            },
            "else": {
              "properties": {
                "fault": { "type": "null" }
              }
            }
          }
        ],
        "examples": [
          {
            "status": "heating",
            "activeMode": "brew",
            "boilerTemperatureC": 87.4,
            "brewTargetC": 93,
            "steamTargetC": 115,
            "heaterEnabled": true,
            "heaterActive": true,
            "fault": null,
            "steamTimeoutRemainingMs": null,
            "uptimeMs": 184220
          },
          {
            "status": "fault",
            "activeMode": "brew",
            "boilerTemperatureC": 24.5,
            "brewTargetC": 93,
            "steamTargetC": 115,
            "heaterEnabled": false,
            "heaterActive": false,
            "fault": {
              "code": "sensor_failure",
              "message": "The boiler thermocouple reading is unavailable."
            },
            "steamTimeoutRemainingMs": null,
            "uptimeMs": 185000
          }
        ]
      },
      "TemperatureSettingsRequest": {
        "type": "object",
        "additionalProperties": false,
        "properties": {
          "brewTargetC": { "$ref": "#/components/schemas/BrewTarget" },
          "steamTargetC": { "$ref": "#/components/schemas/SteamTarget" }
        },
        "anyOf": [
          { "required": ["brewTargetC"] },
          { "required": ["steamTargetC"] }
        ],
        "examples": [
          { "brewTargetC": 93, "steamTargetC": 115 }
        ]
      },
      "TemperatureSettingsResponse": {
        "type": "object",
        "additionalProperties": false,
        "required": ["brewTargetC", "steamTargetC"],
        "properties": {
          "brewTargetC": { "$ref": "#/components/schemas/BrewTarget" },
          "steamTargetC": { "$ref": "#/components/schemas/SteamTarget" }
        },
        "examples": [
          { "brewTargetC": 93, "steamTargetC": 115 }
        ]
      },
      "ModeRequest": {
        "type": "object",
        "additionalProperties": false,
        "required": ["mode"],
        "properties": {
          "mode": { "$ref": "#/components/schemas/Mode" }
        },
        "examples": [
          { "mode": "steam" }
        ]
      },
      "ModeResponse": {
        "type": "object",
        "additionalProperties": false,
        "required": ["mode"],
        "properties": {
          "mode": { "$ref": "#/components/schemas/Mode" }
        },
        "examples": [
          { "mode": "steam" }
        ]
      },
      "HeaterSettingsRequest": {
        "type": "object",
        "additionalProperties": false,
        "required": ["heaterEnabled"],
        "properties": {
          "heaterEnabled": { "type": "boolean" }
        },
        "examples": [
          { "heaterEnabled": false }
        ]
      },
      "HeaterSettingsResponse": {
        "type": "object",
        "additionalProperties": false,
        "required": ["heaterEnabled"],
        "properties": {
          "heaterEnabled": { "type": "boolean" }
        },
        "examples": [
          { "heaterEnabled": false }
        ]
      },
      "OverTemperatureDismissResponse": {
        "$ref": "#/components/schemas/MachineState",
        "examples": [
          {
            "status": "heating",
            "activeMode": "brew",
            "boilerTemperatureC": 93,
            "brewTargetC": 93,
            "steamTargetC": 115,
            "heaterEnabled": true,
            "heaterActive": false,
            "fault": null,
            "steamTimeoutRemainingMs": null,
            "uptimeMs": 190000
          }
        ]
      },
      "ProfileSlotId": {
        "type": "string",
        "enum": ["profile-1", "profile-2", "profile-3", "profile-4"],
        "pattern": "^[a-z][a-z0-9-]*$"
      },
      "ProfileName": {
        "type": "string",
        "minLength": 1,
        "maxLength": 12,
        "pattern": "^[A-Za-z0-9]+$"
      },
      "ExtractionProfile": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "name",
          "preInfusionSeconds",
          "soakSeconds",
          "mainExtractionSeconds"
        ],
        "properties": {
          "name": { "$ref": "#/components/schemas/ProfileName" },
          "preInfusionSeconds": { "type": "integer", "minimum": 0, "maximum": 60 },
          "soakSeconds": { "type": "integer", "minimum": 0, "maximum": 60 },
          "mainExtractionSeconds": { "type": "integer", "minimum": 1, "maximum": 60 }
        },
        "description": "Whole-second phases whose sum must not exceed 60 seconds. A zero pre-infusion requires zero soak.",
        "allOf": [
          {
            "if": {
              "properties": { "preInfusionSeconds": { "const": 0 } },
              "required": ["preInfusionSeconds"]
            },
            "then": {
              "properties": { "soakSeconds": { "const": 0 } }
            }
          }
        ],
        "examples": [
          {
            "name": "Classic30",
            "preInfusionSeconds": 0,
            "soakSeconds": 0,
            "mainExtractionSeconds": 30
          },
          {
            "name": "Pre5Soak5",
            "preInfusionSeconds": 5,
            "soakSeconds": 5,
            "mainExtractionSeconds": 25
          }
        ]
      },
      "ProfileSet": {
        "type": "object",
        "additionalProperties": false,
        "required": ["profiles"],
        "properties": {
          "profiles": {
            "type": "array",
            "minItems": 4,
            "maxItems": 4,
            "prefixItems": [
              {
                "type": "object",
                "additionalProperties": false,
                "required": ["id", "profile"],
                "properties": {
                  "id": { "const": "profile-1" },
                  "profile": {
